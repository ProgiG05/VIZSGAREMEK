<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Plant Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/login.css"> 
</head>
<body>
    <section class="login-section">
        <div class="login-container">
            <div class="login-info-cont first-cont">
                <h1 class="main-title">Grow <span>With Us</span></h1>
                <p class="small-description">Enter your sanctuary. Manage your urban garden and track your plant's growth in one place.</p>
            </div>
            <div class="login-form-cont second-cont">
                <form class="search-cont login-card">
                    <h2 class="search-title">Login</h2>
                    
                    <div class="textInp-cont">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="commonplant-search-inp" placeholder="botanist@garden.com">
                    </div>

                    <div class="textInp-cont">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="commonplant-search-inp" placeholder="••••••••">
                    </div>

                    <div class="check-cont">
                        <div>
                            <input type="checkbox" id="remember">
                            <label for="remember">Keep me rooted (Remember me)</label>
                        </div>
                    </div>

                    <button type="submit" class="gardenMakerPage_Btn login-btn">Sign In</button>
                    
                    <div class="login-footer">
                        <p>New sprout? <a href="#" class="plant-list">Create an account</a></p>
                    </div>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
