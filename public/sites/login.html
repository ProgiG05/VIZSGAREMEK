<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Plant Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/login.css"> 
    <link rel="shortcut icon" href="../pics/icons/plant.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
    <nav id="top-navbar"></nav>
    <section class="login-section">
        <div class="login-container">
            <div class="login-form-cont first-cont">
                <form class="login-card">
                    <h2 class="form-title">Login</h2>
                    <p class="form-subtitle">Welcome back to your sanctuary.</p>
                    
                    <div class="textInp-cont">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="garden-input" placeholder="John Plant">
                    </div>

                    <div class="textInp-cont">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="garden-input" placeholder="••••••••">
                    </div>

                    <div class="check-cont">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
                    
                    <div class="form-footer">
                        <p>No account yet? <a href="signup.html" class="login-link">Create an account</a></p>
                    </div>
                </form>
            </div>

            <div class="login-info-cont second-cont">
                <div class="overlay-text">
                    <h1 class="main-title">Grow <span>With Us</span></h1>
                    <p class="small-description">Enter your sanctuary. Manage your urban garden and gather ideas and knowledges about gardens.</p>
                </div>
            </div>
        </div>
    </section>
    <script type="module" src="../mains/login.js"></script>
</body>
</html>
